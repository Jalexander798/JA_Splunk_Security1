name: Cisco NVM - BITS Download From File Sharing Website
id: 94ebc001-35e7-4ae8-9b0e-52766b2f99c7
version: 1
date: '2025-07-01'
author: Nasreddine Bencherchali, Splunk
status: production
type: Anomaly
description: |
  The following analytic detects a network connection flow from the BITS service towards a file sharing website.
  It leverages Cisco Network Visibility Module logs, specifically flow data logs.
  The BITS service communicating to these domains might indicate an activity where the user is leveraging bitsadmin
  or its COM object to in order to download suspicious files.
  If confirmed malicious, this behavior could indicate an active infection or on keyboard activity.
data_source:
  - Cisco Network Visibility Module Flow Data
search: |
  `cisco_network_visibility_module_flowdata`
  process_name = "svchost.exe"
  process_arguments = "*-s BITS*"
  dest_hostname IN (
      "*.githubusercontent.com*", "*anonfiles.com*", "*cdn.discordapp.com*", "*ddns.net*",
      "*dl.dropboxusercontent.com*", "*ghostbin.co*", "*glitch.me*", "*gofile.io*",
      "*hastebin.com*", "*mediafire.com*", "*mega.nz*", "*onrender.com*", "*pages.dev*",
      "*paste.ee*", "*pastebin.com*", "*pastebin.pl*", "*pastetext.net*", "*privatlab.com*",
      "*privatlab.net*", "*send.exploit.in*", "*sendspace.com*", "*storage.googleapis.com*",
      "*storjshare.io*", "*supabase.co*", "*temp.sh*", "*transfer.sh*", "*trycloudflare.com*",
      "*ufile.io*", "*w3spaces.com*", "*workers.dev*"
    )
  | stats count min(_time) as firstTime max(_time) as lastTime
          values(parent_process_arguments) as parent_process_arguments
          values(process_arguments) as process_arguments
          values(parent_process_hash) as parent_process_hash
          values(process_hash) as process_hash
          values(module_name_list) as module_name_list
          values(module_hash_list) as module_hash_list
          values(dest_port) as dest_port
          values(aliul) as additional_logged_in_users_list
          by src dest parent_process_path parent_process_integrity_level parent_process_id process_path process_integrity_level process_id transport
  | `security_content_ctime(firstTime)`
  | `security_content_ctime(lastTime)`
  | table
    parent_process_integrity_level parent_process_path parent_process_arguments parent_process_hash parent_process_id
    process_integrity_level process_path process_arguments process_hash process_id
    additional_logged_in_users_list module_name_list module_hash_list
    src dest dest_port transport firstTime lastTime
  | `cisco_nvm___bits_download_from_file_sharing_website_filter`
how_to_implement: |
  This search requires Network Visibility Module logs, which includes the flow data sourcetype.
  This search uses an input macro named `cisco_network_visibility_module_flowdata`.
  We strongly recommend that you specify your environment-specific configurations
  (index, source, sourcetype, etc.) for Cisco Network Visibility Module logs.
  Replace the macro definition with configurations for your Splunk environment. 
  The search also uses a post-filter macro designed to filter out known false positives.
  The logs are to be ingested using the Splunk Add-on for Cisco Endpoint Security Analytics (CESA) (https://splunkbase.splunk.com/app/4221).
known_false_positives: |
  False positives should be minimal, as the list of domains is suspicious. If for whatever reason you make use of bitsadmin or its COM objects to download files over these domains legitimately. Apply additional filters by modifying the filter macro. 
references:
  - https://twitter.com/jhencinski/status/1102695118455349248
  - https://isc.sans.edu/forums/diary/Investigating+Microsoft+BITS+Activity/23281/
drilldown_searches:
  - name: View the detection results for - "$src$"
    search: '%original_detection_search% | search  src = "$src$"'
    earliest_offset: $info_min_time$
    latest_offset: $info_max_time$
  - name: View risk events for the last 7 days for - "$src$"
    search: '| from datamodel Risk.All_Risk | search normalized_risk_object IN ("$src$") starthoursago=168  | stats count min(_time)
      as firstTime max(_time) as lastTime values(search_name) as "Search Name" values(risk_message)
      as "Risk Message" values(analyticstories) as "Analytic Stories" values(annotations._all)
      as "Annotations" values(annotations.mitre_attack.mitre_tactic) as "ATT&CK Tactics"
      by normalized_risk_object | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`'
    earliest_offset: $info_min_time$
    latest_offset: $info_max_time$
rba:
  message: The host $src$ used BITS service to communicate and potentially download files from $dest_hostname$ over $dest_port$
  risk_objects:
    - field: src
      type: system
      score: 30
  threat_objects:
    - field: dest_hostname
      type: domain
tags:
  analytic_story:
    - Cisco Network Visibility Module Analytics
  asset_type: Endpoint
  mitre_attack_id:
    - T1197
  product:
    - Splunk Enterprise
    - Splunk Enterprise Security
  security_domain: endpoint
tests:
  - name: True Positive Test - Cisco NVM
    attack_data:
    - data: https://media.githubusercontent.com/media/splunk/attack_data/refs/heads/master/datasets/cisco_network_visibility_module/cisco_nvm_flowdata/nvm_flowdata.log
      source: not_applicable
      sourcetype: cisco:nvm:flowdata
