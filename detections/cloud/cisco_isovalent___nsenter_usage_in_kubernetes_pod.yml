name: Cisco Isovalent - Nsenter Usage in Kubernetes Pod
id: 34567890-cdef-3456-gh12-345678901cde
version: 1
date: '2025-08-12'
author: Bhavin Patel, Splunk
type: Anomaly
data_source:
- Cisco Isovalent Process Exec
status: production
description: The following analytic detects execution of nsenter from within a container, including explicit attempts to join the host’s mount namespace via --mount=/host/proc/1/ns/mnt. Adversaries commonly use nsenter when a pod is misconfigured with excessive privileges (e.g., privileged, hostPID, or broad hostPath mounts) to interact with the underlying node filesystem and processes. This behavior may indicate a container escape attempt to gain persistence or control over the Kubernetes node. Extra scrutiny is warranted for workloads running with privileged security contexts or access to host namespaces and for pods that suddenly begin invoking nsenter outside of normal maintenance activity.
search: |
  `cisco_isovalent` process_exec.process.binary IN ("/usr/bin/nsenter","/bin/nsenter","nsenter")
  OR process_exec.process.args="--mount=/host/proc/1/ns/mnt"
  | rename process_exec.process.pod.namespace as WorkloadNamespace 
  | rename process_exec.process.pod.labels{} as WorkloadLabels
  | rename process_exec.ancestors{}.binary as WorkloadAncestorsBinary
  | eval WorkloadAncestorsBinary=mvjoin(WorkloadAncestorsBinary, " <- ")
  | eval WorkloadLabels=mvjoin(WorkloadLabels, "; ") 
  | stats count by WorkloadNamespace, process_exec.process.binary, process_exec.parent.binary, WorkloadAncestorsBinary | `cisco_isovalent___nsenter_usage_in_kubernetes_pod_filter`
how_to_implement: This analytic leverages Tetragon logs to be ingested using the
  Cisco Security Cloud App.
known_false_positives: Legitimate use of nsenter for administrative purposes.
references:
- https://isovalent.com/blog/post/2021-11-container-escape/
- https://kubehound.io/reference/attacks/CE_NSENTER/
drilldown_searches:
- name: View the detection results for - "$user$"
  search: '%original_detection_search% | search user = "$user$"'
  earliest_offset: $info_min_time$
  latest_offset: $info_max_time$
- name: View risk events for the last 7 days for - "$user$"
  search: '| from datamodel Risk.All_Risk | search normalized_risk_object IN ("$user$")
    starthoursago=168  | stats count min(_time) as firstTime max(_time) as lastTime
    values(search_name) as "Search Name" values(risk_message) as "Risk Message" values(analyticstories)
    as "Analytic Stories" values(annotations._all) as "Annotations" values(annotations.mitre_attack.mitre_tactic)
    as "ATT&CK Tactics" by normalized_risk_object | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`'
  earliest_offset: $info_min_time$
  latest_offset: $info_max_time$
rba:
  message: An nsenter escape attempt has been detected by user on container pod namespace $WorkloadNamespace$
  risk_objects:
  - field: WorkloadNamespace
    type: system
    score: 50
  threat_objects: []
tags:
  analytic_story:
  - Cisco Isovalent Suspicious Activity
  asset_type: Endpoint
  mitre_attack_id:
  - T1611
  product:
  - Splunk Enterprise
  - Splunk Enterprise Security
  - Splunk Cloud
  security_domain: endpoint
tests:
  - name: True Positive Test
    attack_data:
    - data: https://media.githubusercontent.com/media/splunk/attack_data/refs/heads/master/datasets/cisco_isovalent/cisco_isovalent_process_exec/cisco_isovalent_process_exec.log
      source: cisco_isovalent
      sourcetype: cisco:isovalent
