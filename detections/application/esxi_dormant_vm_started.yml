name: ESXi Dormant VM Started
id: 1cd946a5-58b9-4128-acfd-14380a1b0f16
version: 1
date: '2025-05-15'
author: Raven Tait, Splunk
status: production
type: Anomaly
description: This detection identifies virtual machines that were powered on more than 30 days after 
  their last power-off event. While this may reflect legitimate operational activity, it can also 
  indicate unauthorized reactivation of dormant or retired systems for exploitation or persistence.
data_source:
- VMWare ESXi Syslog
search: '`esxi_syslog` Message IN ("*has powered on*","*is powered off*")
  | rex field=_raw "Event \d+ : (?<vm>\S+)(?: on (?<location>\S+))?(?: in (?<datacenter>\S+))?"
  | eval event_time = _time
  | eval event_type = case(
      match(_raw, "powered on"), "power_on",
      match(_raw, "powered off"), "power_off"
    )
  | stats 
      latest(eval(if(event_type=="power_on", event_time, null()))) as LastPowerOnTime,
      latest(eval(if(event_type=="power_off", event_time, null()))) as LastPowerOffTime,
      values(location) as location,
      values(datacenter) as datacenter,
      values(host) as host
    by vm
  | where isnotnull(LastPowerOffTime) AND isnotnull(LastPowerOnTime)
  | where LastPowerOnTime - LastPowerOffTime > 2592000
  | eval LastPowerOffTime = strftime(LastPowerOffTime, "%Y-%m-%d %H:%M:%S")
  | eval LastPowerOnTime = strftime(LastPowerOnTime, "%Y-%m-%d %H:%M:%S")
  | stats min(_time) as firstTime max(_time) as lastTime count by vm location datacenter host LastPowerOffTime LastPowerOnTime
  | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`
  | `esxi_dormant_vm_started_filter`'
how_to_implement: This is based on syslog data generated by VMware ESXi hosts. To implement this search, 
  you must configure your ESXi systems to forward syslog output to your Splunk deployment. These logs must 
  be ingested with the appropriate Splunk Technology Add-on for VMware ESXi Logs, which provides field
  extractions and CIM compatibility. 
known_false_positives: May have false positives on test or lab VMs that are only occasionally used. Tune as needed.
drilldown_searches:
- name: View the detection results for - "$host$"
  search: '%original_detection_search% | search  dest = "$host$"'
  earliest_offset: $info_min_time$
  latest_offset: $info_max_time$
- name: View risk events for the last 7 days for - "$host$"
  search: '| from datamodel Risk.All_Risk | search normalized_risk_object IN ("$host$")
    starthoursago=168  | stats count min(_time) as firstTime max(_time) as lastTime
    values(search_name) as "Search Name" values(risk_message) as "Risk Message" values(analyticstories)
    as "Analytic Stories" values(annotations._all) as "Annotations" values(annotations.mitre_attack.mitre_tactic)
    as "ATT&CK Tactics" by normalized_risk_object | `security_content_ctime(firstTime)`
    | `security_content_ctime(lastTime)`'
  earliest_offset: $info_min_time$
  latest_offset: $info_max_time$
rba:
  message: Dormant VM started on ESXi host $host$.
  risk_objects:
  - field: host
    type: system
    score: 45
  threat_objects: []
tags:
  analytic_story:
  - ESXi Post Compromise
  - Black Basta Ransomware
  asset_type: Infrastructure
  mitre_attack_id:
  - T1584
  product:
  - Splunk Enterprise
  - Splunk Enterprise Security
  - Splunk Cloud
  security_domain: endpoint
tests:
- name: True Positive Test
  attack_data:
  - data: https://media.githubusercontent.com/media/splunk/attack_data/master/datasets/attack_techniques/T1584/esxi_dormant_vm_started/esxi_dormant_vm_started.log
    source: vmware:esxlog
    sourcetype: vmw-syslog
