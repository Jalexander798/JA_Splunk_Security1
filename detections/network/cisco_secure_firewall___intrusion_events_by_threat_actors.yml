name: Cisco Secure Firewall - Intrusion Events by Threat Actors
id: b71e57e8-c571-4ff1-ae13-bc4384a9e891
version: 1
date: '2025-05-12'
author: Bhavin Patel, Nasreddine Bencherchali, Splunk
status: production
type: Anomaly
description: |
  This analytic detects intrusion events from known threat actors using Cisco Secure Firewall Intrusion Events. 
  It leverages Cisco Secure Firewall Threat Defense IntrusionEvent logs to identify cases where multiple Snort signatures 
  associated with known threat actor activities have been triggered within a one-hour time window. The detection uses a 
  lookup table (snort_ids_threat_actor.csv) to map Snort signature IDs to known threat actors and their techniques. 
  When multiple signatures associated with the same threat actor are triggered within the time window, and the count of 
  unique signatures matches or exceeds the expected number of signatures for that threat actor's technique, an alert is generated. 
  This helps identify potential coordinated threat actor activity in your network environment by correlating related intrusion 
  events that occur in close temporal proximity.
data_source:
  - Cisco Secure Firewall Threat Defense Intrusion Event
search: |
  `cisco_secure_firewall` EventType=IntrusionEvent 
  | bin _time span=1h 
  | stats count as Total_Alerts dc(signature_id) as sig_count 
      values(signature_id) as signature_ids 
      values(signature) as signature 
      values(class_desc) as class_desc 
      values(MitreAttackGroups) as MitreAttackGroups 
      values(InlineResult) as InlineResult 
      values(InlineResultReason) as InlineResultReason 
      values(src_ip) as src_ip 
      values(dest_port) as dest_port 
      values(rule) as rule 
      values(transport) as transport 
      values(connection_id) as connection_id
      values(app) as app
      by dest_ip _time 
  | eval sig_ids_str = mvjoin(signature_ids, ",") 
  | lookup snort_ids_threat_actor.csv signature_id as sig_ids_str OUTPUT threat_actor, distinct_count_snort_ids, description,threat_actor_technique 
  | where isnotnull(threat_actor) AND sig_count >= tonumber(distinct_count_snort_ids) 
  | `security_content_ctime(firstTime)` 
  | `security_content_ctime(lastTime)`
  | table _time threat_actor threat_actor_technique description dest_ip signature_ids signature src_ip MitreAttackGroups connection_id
  | `cisco_secure_firewall___intrusion_events_by_threat_actors_filter`
how_to_implement: |
  This search requires Cisco Secure Firewall Threat Defense Logs, which
  includes the IntrusionEvent EventType. This search uses an input macro named `cisco_secure_firewall`.
  We strongly recommend that you specify your environment-specific configurations
  (index, source, sourcetype, etc.) for Cisco Secure Firewall Threat Defense logs. Replace the macro definition
  with configurations for your Splunk environment. The search also uses a post-filter
  macro designed to filter out known false positives.
  The logs are to be ingested using the Splunk Add-on for Cisco Security Cloud (https://splunkbase.splunk.com/app/7404).
  The intrusion access policy must also be configured.
known_false_positives: False positives may occur due to legitimate security testing or research activities.
references:
  - https://www.cisco.com/c/en/us/products/security/firewalls/index.html
drilldown_searches:
- name: View the detection results for - "$dest_ip$"
  search: '%original_detection_search% | search  dest_ip = "$dest_ip$"'
  earliest_offset: $info_min_time$
  latest_offset: $info_max_time$
- name: View risk events for the last 7 days for - "$dest_ip$""
  search: '| from datamodel Risk.All_Risk | search normalized_risk_object IN ("$dest_ip$") starthoursago=168  | stats count min(_time)
    as firstTime max(_time) as lastTime values(search_name) as "Search Name" values(risk_message)
    as "Risk Message" values(analyticstories) as "Analytic Stories" values(annotations._all)
    as "Annotations" values(annotations.mitre_attack.mitre_tactic) as "ATT&CK Tactics"
    by normalized_risk_object | `security_content_ctime(firstTime)` | `security_content_ctime(lastTime)`'
  earliest_offset: $info_min_time$
  latest_offset: $info_max_time$
rba:
  message: Potential threat actor activity detected from $src_ip$ to $dest_ip$.
  risk_objects:
    - field: dest_ip
      type: system
      score: 50
  threat_objects:
    - field: signature
      type: signature
tags:
  analytic_story: 
    - Cisco Secure Firewall Threat Defense Analytics
  asset_type: Network
  security_domain: network
  mitre_attack_id:
    - T1041
    - T1573.002
  product:
    - Splunk Enterprise
    - Splunk Cloud
    - Splunk Enterprise Security
tests:
- name: True Positive Test
  attack_data:
  - data: https://media.githubusercontent.com/media/splunk/attack_data/master/datasets/cisco_secure_firewall_threat_defense/lumma_stealer/lumma_stealer_events.log
    source: not_applicable
    sourcetype: cisco:sfw:estreamer 