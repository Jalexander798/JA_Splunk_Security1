  - authserver
  - vendor_product
  - action
  risk_score: 40
  security_domain: identity
  cve: []
tests:
- name: True Positive Test
  attack_data:
  - data: https://github.com/splunk/contentctl/wiki
    sourcetype: WinEventLog:Security
    source: Active Directory
