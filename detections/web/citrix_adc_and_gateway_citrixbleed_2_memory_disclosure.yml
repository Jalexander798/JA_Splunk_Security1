  - Citrix NetScaler ADC and NetScaler Gateway CVE-2025-5777
  asset_type: Web Application
  mitre_attack_id:
  - T1190
  product:
  - Splunk Enterprise
  - Splunk Enterprise Security
  - Splunk Cloud
  security_domain: network
  cve:
  - CVE-2025-5777
tests:
