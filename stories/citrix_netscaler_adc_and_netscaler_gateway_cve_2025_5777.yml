name: Citrix NetScaler ADC and NetScaler Gateway CVE-2025-5777
id: f8a7d2e1-9b3c-4f5e-a8d6-c7b4e9a2f1d8
version: 1
date: '2025-01-07'
author: Michael Haag, Splunk
status: production
description: A critical security update, CVE-2025-5777, has been released for NetScaler ADC and NetScaler Gateway. This vulnerability, dubbed "CitrixBleed 2," represents an out-of-bounds memory read flaw that can result in unauthorized data disclosure if exploited. Similar to CVE-2023-4966 (the original CitrixBleed), this vulnerability allows attackers to leak sensitive information from device memory, including session tokens, authentication cookies, and other critical data that can lead to session hijacking and unauthorized access. The Cybersecurity and Infrastructure Security Agency (CISA) has added CVE-2025-5777 to its Known Exploited and Vulnerabilities Catalog due to active exploitation in the wild. No workarounds are available for this vulnerability, and immediate installation of the recommended builds is strongly advised.
narrative: On June 17, 2025, Cloud Software Group released emergency security updates to fix CVE-2025-5777, a critical vulnerability affecting NetScaler ADC and NetScaler Gateway. This vulnerability, known as "CitrixBleed 2," is an out-of-bounds memory read flaw that allows unauthenticated remote attackers to obtain sensitive information from NetScaler appliances configured as Gateway (VPN virtual server, ICA Proxy, CVPN, RDP Proxy) or AAA virtual servers. The vulnerability is exploited by sending specially crafted HTTP requests with oversized Host headers to the "/nf/auth/startwebview.do" endpoint, causing the device to leak memory contents including session tokens, SAML StateContext, MFA tokens, and other authentication materials. Unlike the original CitrixBleed (CVE-2023-4966), this new vulnerability affects a different code path but uses the same underlying exploit technique involving improper use of the snprintf() function. Security researchers have observed active exploitation attempts within days of the vulnerability's disclosure, with threat actors using automated tools to scan for vulnerable instances. The leaked session tokens can be directly reused to bypass authentication, including multi-factor authentication (MFA), allowing attackers to gain unauthorized access to protected resources. CISA added CVE-2025-5777 to its Known Exploited Vulnerabilities Catalog on June 23, 2025, indicating widespread exploitation attempts. Organizations are strongly advised to immediately apply patches, kill all active sessions, and monitor for signs of compromise as no workarounds are available for this critical vulnerability.
